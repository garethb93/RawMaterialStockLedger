<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockLedger Pro | Visual Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nav-link.active { @apply text-indigo-600 border-b-2 border-indigo-600; }
        .hidden { display: none; }
        /* Map Styles */
        .bay { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 2; transition: all 0.3s ease; cursor: pointer; }
        .bay-label { font-size: 12px; font-weight: bold; fill: #94a3b8; pointer-events: none; }
        .highlight { fill: #fbbf24 !important; stroke: #d97706 !important; filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6)); }
        .sku-card { cursor: pointer; transition: transform 0.2s; }
        .sku-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- NAVIGATION -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 flex justify-between h-16">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 mr-4">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
                    <span class="font-bold text-slate-800 hidden lg:block">StockLedger Pro</span>
                </div>
                <div class="flex h-full space-x-8">
                    <button onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link active h-full flex items-center px-1 text-sm font-medium text-slate-500">Dashboard</button>
                    <button onclick="showPage('log')" id="nav-log" class="nav-link h-full flex items-center px-1 text-sm font-medium text-slate-500">Log Movement</button>
                    <button onclick="showPage('products')" id="nav-products" class="nav-link h-full flex items-center px-1 text-sm font-medium text-slate-500">Products</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="connection-status" class="text-[10px] font-bold uppercase px-2 py-1 rounded bg-amber-100 text-amber-600">Connecting...</div>
            </div>
        </div>
    </nav>

    <!-- DASHBOARD -->
    <main id="page-dashboard" class="max-w-6xl mx-auto px-4 py-8 space-y-8">
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Live Stock Levels (Click to locate)</h2>
                <button onclick="downloadPDF()" class="text-xs text-indigo-600 font-bold">Export PDF Report</button>
            </div>
            <div id="inventoryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
        </section>

        <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold text-slate-700">Audit Log</h3>
                <input type="text" id="searchInput" placeholder="Search..." class="px-4 py-1.5 text-xs border border-slate-300 rounded-full outline-none">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-100">
                            <th class="px-6 py-3">Type</th>
                            <th class="px-6 py-3">SKU</th>
                            <th class="px-6 py-3 text-right">Qty</th>
                            <th class="px-6 py-3">Staff</th>
                            <th class="px-6 py-3">Location</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- MAP MODAL -->
    <div id="mapModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-4xl w-full overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <div>
                    <h2 id="modalTitle" class="text-xl font-bold text-slate-800">Product Location</h2>
                    <p id="modalSub" class="text-sm text-slate-500"></p>
                </div>
                <button onclick="closeMap()" class="p-2 hover:bg-slate-100 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-8 bg-slate-50 flex justify-center">
                <!-- WAREHOUSE SVG MAP -->
                <svg width="600" height="300" viewBox="0 0 600 300" class="max-w-full h-auto">
                    <!-- Main Warehouse -->
                    <text x="10" y="25" class="text-[10px] font-bold fill-slate-400 uppercase">Main Warehouse</text>
                    <rect x="10" y="40" width="280" height="240" fill="none" stroke="#e2e8f0" stroke-dasharray="4" />
                    
                    <rect id="MAP-A1" class="bay" x="30" y="60" width="50" height="80" /> <text x="42" y="105" class="bay-label">A1</text>
                    <rect id="MAP-A2" class="bay" x="90" y="60" width="50" height="80" /> <text x="102" y="105" class="bay-label">A2</text>
                    <rect id="MAP-A3" class="bay" x="150" y="60" width="50" height="80" /> <text x="162" y="105" class="bay-label">A3</text>
                    <rect id="MAP-A4" class="bay" x="210" y="60" width="50" height="80" /> <text x="222" y="105" class="bay-label">A4</text>

                    <rect id="MAP-B1" class="bay" x="30" y="160" width="50" height="80" /> <text x="42" y="205" class="bay-label">B1</text>
                    <rect id="MAP-B2" class="bay" x="90" y="160" width="50" height="80" /> <text x="102" y="205" class="bay-label">B2</text>
                    <rect id="MAP-B3" class="bay" x="150" y="160" width="50" height="80" /> <text x="162" y="205" class="bay-label">B3</text>
                    <rect id="MAP-B4" class="bay" x="210" y="160" width="50" height="80" /> <text x="222" y="205" class="bay-label">B4</text>

                    <!-- Overflow Warehouse -->
                    <text x="310" y="25" class="text-[10px] font-bold fill-slate-400 uppercase">Overflow Zone</text>
                    <rect x="310" y="40" width="280" height="240" fill="none" stroke="#e2e8f0" stroke-dasharray="4" />
                    
                    <rect id="MAP-C1" class="bay" x="330" y="60" width="100" height="80" /> <text x="365" y="105" class="bay-label">C1</text>
                    <rect id="MAP-C2" class="bay" x="450" y="60" width="100" height="80" /> <text x="485" y="105" class="bay-label">C2</text>
                    <rect id="MAP-C3" class="bay" x="330" y="160" width="100" height="80" /> <text x="365" y="205" class="bay-label">C3</text>
                    <rect id="MAP-C4" class="bay" x="450" y="160" width="100" height="80" /> <text x="485" y="205" class="bay-label">C4</text>
                </svg>
            </div>
            <div class="p-4 bg-white text-center border-t">
                <p class="text-xs text-slate-400 italic">Map highlights the last logged location for this SKU.</p>
            </div>
        </div>
    </div>

    <!-- LOG MOVEMENT & PRODUCTS (Hidden by default) -->
    <main id="page-log" class="max-w-xl mx-auto px-4 py-12 hidden">
        <!-- (Same form as before with QR Scanner) -->
        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-xl">
            <h2 class="text-2xl font-bold text-slate-800 text-center mb-8">Log Movement</h2>
            <div id="scanner-container" class="hidden mb-6"><div id="reader"></div></div>
            <form id="intakeForm" class="space-y-5">
                <div class="flex p-1 bg-slate-100 rounded-xl">
                    <input type="radio" name="movementType" id="typeIn" value="IN" class="hidden" checked>
                    <label for="typeIn" id="labelIn" class="flex-1 text-center py-3 rounded-lg cursor-pointer font-bold text-sm bg-emerald-500 text-white shadow-sm">STOCK IN</label>
                    <input type="radio" name="movementType" id="typeOut" value="OUT" class="hidden">
                    <label for="typeOut" id="labelOut" class="flex-1 text-center py-3 rounded-lg cursor-pointer font-bold text-sm text-slate-500">STOCK OUT</label>
                </div>
                <input type="text" id="staffName" required placeholder="Operator Name" class="w-full px-4 py-3 rounded-xl border border-slate-300 outline-none bg-slate-50">
                <div class="flex gap-2">
                    <select id="matName" required class="flex-1 px-4 py-3 rounded-xl border border-slate-300 outline-none bg-white"></select>
                    <button type="button" onclick="startScanner()" class="bg-slate-100 p-3 rounded-xl hover:bg-slate-200">QR</button>
                </div>
                <input type="number" id="matQty" required placeholder="Quantity" class="w-full px-4 py-3 rounded-xl border border-slate-300 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <select id="warehouse" class="px-4 py-3 rounded-xl border border-slate-300 outline-none bg-white">
                        <option value="Main">Main Warehouse</option>
                        <option value="Overflow">Overflow Zone</option>
                    </select>
                    <select id="bayNum" class="px-4 py-3 rounded-xl border border-slate-300 outline-none bg-white">
                        <option value="A1">A1</option><option value="A2">A2</option><option value="A3">A3</option><option value="A4">A4</option>
                        <option value="B1">B1</option><option value="B2">B2</option><option value="B3">B3</option><option value="B4">B4</option>
                        <option value="C1">C1</option><option value="C2">C2</option><option value="C3">C3</option><option value="C4">C4</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">Confirm Movement</button>
            </form>
        </div>
    </main>

    <main id="page-products" class="max-w-3xl mx-auto px-4 py-12 hidden">
        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm mb-8">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Add New Product Line</h2>
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="newSkuId" required placeholder="SKU ID" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none uppercase">
                <input type="text" id="newSkuName" required placeholder="Product Name" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
                <button type="submit" class="w-full bg-slate-800 text-white font-bold py-2 rounded-lg">Add Product</button>
            </form>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest">
                    <tr><th class="px-6 py-3">SKU ID</th><th class="px-6 py-3">Product Name</th><th class="px-6 py-3 text-right">Actions</th></tr>
                </thead>
                <tbody id="productListBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXcgmqzxpa1zWaxwkDr5xVNAujC6OxkKg",
            authDomain: "warehouse-intake-system.firebaseapp.com",
            projectId: "warehouse-intake-system",
            storageBucket: "warehouse-intake-system.firebasestorage.app",
            messagingSenderId: "367671282137",
            appId: "1:367671282137:web:f950fe1156c87474c871c8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ledgerRef = collection(db, "stock_ledger");
        const productsRef = collection(db, "products");

        let allTransactions = [];
        let allProducts = [];
        let currentBalances = {};

        // --- MAP LOGIC ---
        window.locateProduct = (skuId) => {
            const product = allProducts.find(p => p.id === skuId);
            const lastTx = allTransactions.find(t => t.materialName === skuId);
            
            document.getElementById('modalTitle').innerText = product ? product.name : skuId;
            document.getElementById('modalSub').innerText = lastTx 
                ? `Last seen in ${lastTx.warehouse} - Bay ${lastTx.bayNumber}` 
                : "No location data available yet.";

            // Reset all bays
            document.querySelectorAll('.bay').forEach(b => b.classList.remove('highlight'));

            // Highlight target bay
            if (lastTx && lastTx.bayNumber) {
                const bayEl = document.getElementById(`MAP-${lastTx.bayNumber}`);
                if (bayEl) bayEl.classList.add('highlight');
            }

            document.getElementById('mapModal').classList.remove('hidden');
        };

        window.closeMap = () => document.getElementById('mapModal').classList.add('hidden');

        // --- DATA LISTENERS ---
        onSnapshot(query(productsRef, orderBy("id")), (snapshot) => {
            allProducts = [];
            snapshot.forEach(doc => allProducts.push({ docId: doc.id, ...doc.data() }));
            updateDropdowns();
            updateUI();
        });

        onSnapshot(query(ledgerRef, orderBy("timestamp", "desc")), (snapshot) => {
            allTransactions = [];
            snapshot.forEach(doc => allTransactions.push(doc.data()));
            updateUI();
            document.getElementById('connection-status').innerText = "Live";
            document.getElementById('connection-status').className = "text-[10px] font-bold uppercase px-2 py-1 rounded bg-green-100 text-green-600";
        });

        function updateUI() {
            currentBalances = {};
            allProducts.forEach(p => currentBalances[p.id] = 0);
            allTransactions.forEach(t => { if(currentBalances[t.materialName] !== undefined) currentBalances[t.materialName] += t.quantity; });
            
            document.getElementById('inventoryGrid').innerHTML = allProducts.map(p => `
                <div onclick="locateProduct('${p.id}')" class="sku-card bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase truncate">${p.name}</p>
                    <p class="text-xl font-bold ${currentBalances[p.id] < 10 ? 'text-red-500' : 'text-slate-800'}">${(currentBalances[p.id] || 0).toLocaleString()}</p>
                    <div class="flex justify-between items-center mt-1">
                        <p class="text-[9px] font-mono text-slate-400">${p.id}</p>
                        <span class="text-[9px] text-indigo-500 font-bold">LOCATE →</span>
                    </div>
                </div>
            `).join('');
            renderTable(allTransactions);
        }

        // --- (Standard Helpers: Dropdowns, Table, Forms, QR, Routing) ---
        function updateDropdowns() {
            const select = document.getElementById('matName');
            const listBody = document.getElementById('productListBody');
            select.innerHTML = `<option value="" disabled selected>Select SKU...</option>` + allProducts.map(p => `<option value="${p.id}">${p.id} (${p.name})</option>`).join('');
            listBody.innerHTML = allProducts.map(p => `<tr><td class="px-6 py-4 font-mono font-bold text-indigo-600">${p.id}</td><td class="px-6 py-4 text-slate-600">${p.name}</td><td class="px-6 py-4 text-right"><button onclick="confirmDeleteProduct('${p.docId}', '${p.id}')" class="text-red-500 text-xs font-bold">DELETE</button></td></tr>`).join('');
        }

        function renderTable(data) {
            document.getElementById('ledgerBody').innerHTML = data.map(item => {
                const date = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleDateString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '...';
                const isOut = item.type === 'OUT' || item.quantity < 0;
                return `<tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${isOut ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">${isOut ? 'OUT' : 'IN'}</span></td>
                    <td class="px-6 py-4 font-bold text-slate-700">${item.materialName}</td>
                    <td class="px-6 py-4 text-right font-mono font-bold ${isOut ? 'text-red-500' : 'text-emerald-600'}">${isOut ? '' : '+'}${item.quantity}</td>
                    <td class="px-6 py-4 text-xs font-medium text-slate-600">${item.submittedBy || 'System'}</td>
                    <td class="px-6 py-4 text-[11px] text-slate-400">${item.warehouse} / ${item.bayNumber}</td>
                </tr>`;
            }).join('');
        }

        document.getElementById('intakeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('typeOut').checked ? 'OUT' : 'IN';
            const qty = parseInt(document.getElementById('matQty').value);
            await addDoc(ledgerRef, {
                submittedBy: document.getElementById('staffName').value,
                materialName: document.getElementById('matName').value,
                quantity: type === 'OUT' ? -Math.abs(qty) : Math.abs(qty),
                type: type,
                warehouse: document.getElementById('warehouse').value,
                bayNumber: document.getElementById('bayNum').value,
                timestamp: serverTimestamp()
            });
            localStorage.setItem('staffName', document.getElementById('staffName').value);
            document.getElementById('matQty').value = "";
            showPage('dashboard');
        });

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(productsRef, { id: document.getElementById('newSkuId').value.toUpperCase(), name: document.getElementById('newSkuName').value });
            document.getElementById('productForm').reset();
        });

        window.showPage = (pageId) => {
            ['dashboard', 'log', 'products'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hidden');
                document.getElementById(`nav-${p}`).classList.remove('active');
            });
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            document.getElementById(`nav-${pageId}`).classList.add('active');
        };

        window.downloadPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Stock Status Report", 14, 20);
            const data = allProducts.map(p => [p.id, p.name, currentBalances[p.id].toLocaleString()]);
            doc.autoTable({ startY: 30, head: [['SKU', 'Description', 'Balance']], body: data, theme: 'striped' });
            doc.save(`Stock_Report.pdf`);
        };

        document.getElementById('staffName').value = localStorage.getItem('staffName') || "";
    </script>
</body>
</html>
